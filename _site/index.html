<script>

const dataContainer = document.getElementById('data-params');
const modelContainer = document.getElementById('model-params');
const exportButton = document.getElementById('export-button');

let has_file = false;
let export_mode = "";

const INTEGER_IDS = ["hidden-layers", "hidden-size", "batch-size", "num-epochs", "patience"];
const FLOAT_IDS = ["learn-rate", "weight-decay", "momentum", "min-delta"];
const PROPORTION_IDS = ["test-split", "valid-split"];
const TUNABLE_IDS = ["hidden-layers", "hidden-size", "batch-size", "num-epochs", "learn-rate", "weight-decay", "momentum"];

const modelConfig = [
    {
        group: "Training Data Split Proportions",
        params: [
            { id: "test-split", train_placeholder: "0.1", tune_placeholder: "0.1",
              train_label: 'Testing Set Proportion:<br><i style="color: #1e6bb8;">(non-negative float)</i>',
              tune_label: 'Testing Set Proportion:<br><i style="color: #1e6bb8;">(non-negative float)</i>',
              train_alert: '- Invalid testing set proportion. Must be non-negative float between 0 (inclusive) and 1.',
              tune_alert: '- Invalid testing set proportion. Must be non-negative float between 0 (inclusive) and 1. Not a tunable parameter.' },
            { id: "valid-split", train_placeholder: "0.1", tune_placeholder: "0.1",
              train_label: 'Validation Set Proportion:<br><i style="color: #1e6bb8;">(non-negative float)</i>',
              tune_label: 'Validation Set Proportion:<br><i style="color: #1e6bb8;">(non-negative float)</i>',
              train_alert: '- Invalid validation set proportion. Must be non-negative float between 0 (inclusive) and 1.',
              tune_alert: '- Invalid validation set proportion. Must be non-negative float between 0 (inclusive) and 1. Not a tunable parameter.' }
        ]
    },
    {
        group: "Neural Network Architecture",
        params: [
            { id: "architecture", type: "select", options: ["Pyramidal", "Rectangular"],
              train_label: 'Architecture:',
              tune_label: 'Architecture:<br><i style="color: #1e6bb8;">(select one or more)</i>' },
            { id: "hidden-layers", train_placeholder: "4", tune_placeholder: "2, 4, 6, 8, 10, 12",
              train_label: 'Number of Hidden Layers:<br><i style="color: #1e6bb8;">(positive integer)</i>',
              train_alert: '- Invalid number of hidden layers. Must be positive integer.',
              tune_label: 'Number of Hidden Layers:<br><i style="color: #1e6bb8;">(list of positive integers)</i>',
              tune_alert: '- Invalid number(s) of hidden layers. Must be list of positive integers.' },
            { id: "hidden-size", train_placeholder: "64", tune_placeholder: "32, 64, 128, 256, 512, 1024",
              train_label: 'Max Hidden Layer Size:<br><i style="color: #1e6bb8;">(positive integer)</i>',
              train_alert: '- Invalid hidden layer size. Must be positive integer.',
              tune_label: 'Max Hidden Layer Size:<br><i style="color: #1e6bb8;">(list of positive integers)</i>',
              tune_alert: '- Invalid hidden layer size(s). Must be list of positive integers.' }
        ]
    },
    {
        group: "Training Loop Parameters",
        params: [
            { id: "device", type: "select", options: ["CPU", "CUDA"],
              train_label: 'Processing Device:', tune_label: 'Processing Device:' },
            { id: "batch-size", train_placeholder: "32", tune_placeholder: "32, 64, 128, 256, 512, 1024",
              train_label: 'Batch Size:<br><i style="color: #1e6bb8;">(positive integer)</i>',
              train_alert: '- Invalid batch size. Must be positive integer.',
              tune_label: 'Batch Size:<br><i style="color: #1e6bb8;">(list of positive integers)</i>',
              tune_alert: '- Invalid batch size(s). Must be list of positive integers.' },
            { id: "num-epochs", train_placeholder: "10000", tune_placeholder: "10000",
              train_label: 'Max Number of Epochs:<br><i style="color: #1e6bb8;">(positive integer)</i>',
              train_alert: '- Invalid number of epochs. Must be positive integer.',
              tune_label: 'Max Number of Epochs:<br><i style="color: #1e6bb8;">(list of positive integers)</i>',
              tune_alert: '- Invalid number(s) of epochs. Must be list of positive integers.' },
            { id: "early-stop", type: "check",
              train_label: 'Early Stopping:', tune_label: 'Early Stopping:' },
            { id: "patience", train_placeholder: "20", tune_placeholder: "20",
              train_label: 'Patience:<br><i style="color: #1e6bb8;">(positive integer)</i>',
              train_alert: '- Invalid patience. Must be positive integer.',
              tune_label: 'Patience:<br><i style="color: #1e6bb8;">(positive integer)</i>',
              tune_alert: '- Invalid patience. Must be positive integer.' },
            { id: "min-delta", train_placeholder: "0", tune_placeholder: "0",
              train_label: 'Min Delta:<br><i style="color: #1e6bb8;">(float)</i>',
              train_alert: '- Invalid minimum delta. Must be float.',
              tune_label: 'Min Delta:<br><i style="color: #1e6bb8;">(float)</i>',
              tune_alert: '- Invalid minimum delta. Must be float.' }
        ]
    },
    {
        group: "Optimizer Parameters",
        params: [
            { id: "loss-func", type: "select", options: ["NLL", "MSE", "KLD"],
              train_label: 'Loss Function:', tune_label: 'Loss Function' },
            { id: "optimizer", type: "select", options: ["AdamW", "Adam", "RMSprop", "SGD"],
              train_label: 'Optimization Algorithm:',
              tune_label: 'Optimization Algorithm:<br><i style="color: #1e6bb8;">(select one or more)</i>' },
            { id: "learn-rate", train_placeholder: "0.001", tune_placeholder: "0.01, 0.001, 0.0001",
              train_label: 'Learning Rate:<br><i style="color: #1e6bb8;">(positive float)</i>',
              train_alert: '- Invalid learning rate. Must be positive float.',
              tune_label: 'Learning Rate:<br><i style="color: #1e6bb8;">(list of positive floats)</i>',
              tune_alert: '- Invalid learning rate(s). Must be list of positive floats.' },
            { id: "weight-decay", train_placeholder: "0", tune_placeholder: "0",
              train_label: 'Weight Decay:<br><i style="color: #1e6bb8;">(non-negative float)</i>',
              train_alert: '- Invalid weight decay. Must be non-negative float.',
              tune_label: 'Weight Decay:<br><i style="color: #1e6bb8;">(list of non-negative floats)</i>',
              tune_alert: '- Invalid weight decay(s). Must be list of non-negative floats.' },
            { id: "momentum", train_placeholder: "0", tune_placeholder: "0",
              train_label: 'Momentum:<br><i style="color: #1e6bb8;">(non-negative float)</i>',
              train_alert: '- Invalid momentum. Must be non-negative float.',
              tune_label: 'Momentum:<br><i style="color: #1e6bb8;">(list of non-negative floats)</i>',
              tune_alert: '- Invalid momentum(s). Must be list of non-negative floats.' }
        ]
    }
];

function buildOptionsHtml(options) {
    return options.map(opt => `<option value="${opt}">${opt}</option>`).join('');
}

function validateNumericParam(paramId, value, isTrainMode) {
    const num = Number(value);

    if (INTEGER_IDS.includes(paramId)) {
        return (Number.isInteger(num) && num > 0) ? num : null;
    }
    if (FLOAT_IDS.includes(paramId)) {
        if (isNaN(num)) return null;
        if (paramId === 'learn-rate') return num > 0 ? num : null;
        if (paramId === 'min-delta') return num;
        return num >= 0 ? num : null;
    }
    if (PROPORTION_IDS.includes(paramId)) {
        return (!isNaN(num) && num >= 0 && num < 1) ? num : null;
    }
    return undefined;
}

function getFieldValue(id) {
    const el = document.getElementById(id);
    if (!el) return null;
    if (id === 'early-stop') return el.checked;

    const isHidden = el.closest('div').style.display === 'none';
    if (isHidden || el.value.trim() === "") {
        return el.placeholder || el.value;
    }
    if (export_mode === 'Tune' && (id === 'architecture' || id === 'optimizer')) {
        return Array.from(el.selectedOptions).map(opt => opt.value);
    }
    return el.value;
}

function downloadJson(data, filename) {
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data, null, 4));
    const anchor = document.createElement('a');
    anchor.setAttribute("href", dataStr);
    anchor.setAttribute("download", filename);
    document.body.appendChild(anchor);
    anchor.click();
    anchor.remove();
}

function renderModelParams(export_mode) {
    modelContainer.innerHTML = '';

    modelConfig.forEach(section => {
        const sectionRow = document.createElement('div');
        sectionRow.className = "model-param-group";
        sectionRow.style.marginBottom = "10px";
        sectionRow.style.borderBottom = "1px solid #eee";
        sectionRow.style.paddingBottom = "10px";

        const header = document.createElement('div');
        header.innerHTML = `<span style="display: inline-block; min-width: 200px;"><strong>${section.group}</strong></span>`;
        sectionRow.appendChild(header);

        section.params.forEach(param => {
            const row = document.createElement('div');
            row.id = `${param.id}-row`;
            row.style.marginTop = "10px";
            row.style.paddingLeft = "20px";
            row.style.display = "flex";
            row.style.alignItems = "flex-start";

            let inputHtml;
            if (param.type === 'select') {
                const isMultiSelect = export_mode === 'Tune' &&
                                      (param.id === 'architecture' || param.id === 'optimizer');
                if (isMultiSelect) {
                    inputHtml = `<select id="${param.id}" multiple required size="${param.options.length}">${buildOptionsHtml(param.options)}</select>`;
                } else {
                    inputHtml = `<select id="${param.id}">${buildOptionsHtml(param.options)}</select>`;
                }
            } else if (param.type === 'check') {
                inputHtml = `<div><input id="${param.id}" type="checkbox" checked></div>`;
            } else {
                const isTune = export_mode === 'Tune';
                const isShortInput = !isTune ||
                    param.id === 'test-split' || param.id === 'valid-split' ||
                    param.id === 'patience' || param.id === 'min-delta';
                const width = isShortInput ? '100px' : '400px';
                const placeholder = isTune ? param.tune_placeholder : param.train_placeholder;
                inputHtml = `<input type="text" id="${param.id}" style="width: ${width}" placeholder="${placeholder}">`;
            }

            const label = export_mode === 'Train' ? param.train_label : param.tune_label;
            row.innerHTML =
                `<label for="${param.id}" style="display: inline-block; min-width: 220px; text-align: right; margin-right: 10px">${label}</label>${inputHtml}`;

            sectionRow.appendChild(row);
        });

        modelContainer.appendChild(sectionRow);
    });

    const optimizerSelect = document.getElementById('optimizer');
    const architectureSelect = document.getElementById('architecture');
    const earlyStopCheckbox = document.getElementById('early-stop');
    const momentumRow = document.getElementById('momentum-row');
    const patienceRow = document.getElementById('patience-row');
    const minDeltaRow = document.getElementById('min-delta-row');

    optimizerSelect.options[0].selected = true;
    architectureSelect.options[0].selected = true;

    if (optimizerSelect && momentumRow) {
        const toggleMomentum = () => {
            momentumRow.style.display = (optimizerSelect.value === 'SGD') ? 'flex' : 'none';
        };
        toggleMomentum();
        optimizerSelect.addEventListener('change', toggleMomentum);
    }

    earlyStopCheckbox.addEventListener('change', function(event) {
        const display = event.target.checked ? 'flex' : 'none';
        patienceRow.style.display = display;
        minDeltaRow.style.display = display;
    });
}

dataContainer.addEventListener('change', function(event) {
    if (!event.target.classList.contains('param-option')) return;

    const radio = event.target;
    const row = radio.closest('.data-param');
    const nameEntry = row.querySelector('.name-entry');
    const typeOptions = row.querySelector('.type-options');
    const minThreshEntry = row.querySelector('.min-thresh-entry');
    const maxThreshEntry = row.querySelector('.max-thresh-entry');
    const distOptions = row.querySelector('.dist-options');

    const isInputOrOutput = radio.checked && (radio.value === 'input' || radio.value === 'output');
    const isOutput = radio.checked && radio.value === 'output';

    nameEntry.style.display = isInputOrOutput ? 'block' : 'none';
    typeOptions.style.display = isInputOrOutput ? 'block' : 'none';
    minThreshEntry.style.display = isOutput ? 'block' : 'none';
    maxThreshEntry.style.display = isOutput ? 'block' : 'none';
    distOptions.style.display = isOutput ? 'block' : 'none';

    const typeSelect = typeOptions.querySelector('select');
    const stringOption = typeSelect.querySelector('option[value="string"]');
    stringOption.hidden = isOutput;
    stringOption.disabled = isOutput;
    if (isOutput && typeSelect.value === 'string') {
        typeSelect.value = 'float';
    }
});

document.getElementById('tsv-upload').addEventListener('change', function(event) {
    const file = event.target.files[0];
    if (!file) return;

    const fileExtension = file.name.split('.').pop().toLowerCase();
    if (fileExtension !== 'tsv') {
        alert("Invalid Training Data File Type.");
        event.target.value = '';
        return;
    }

    has_file = true;
    dataContainer.innerHTML = '';
    dataContainer.style.display = 'block';
    document.getElementById('estimation-options').style.display = 'block';

    const reader = new FileReader();
    reader.onload = function(e) {
        const lines = e.target.result.split(/\r?\n/);
        if (lines.length === 0) return;

        const headers = lines[0].split('\t');
        headers.forEach((header, index) => {
            const clean_header = header.trim();
            if (clean_header === "") return;

            const row = document.createElement('div');
            row.className = "data-param";
            row.style.marginBottom = "10px";
            row.style.borderBottom = "1px solid #eee";
            row.style.paddingBottom = "10px";

            row.innerHTML = `
                <span style="display: inline-block; min-width: 300px;"><strong>${clean_header}</strong></span>
                <label style="margin-right: 20px;"><input type="radio" style="margin-right: 5px" class="param-option" name="group-${index}" value="input">Input</label>
                <label style="margin-right: 20px;"><input type="radio" style="margin-right: 5px" class="param-option" name="group-${index}" value="output">Output</label>
                <label style="margin-right: 20px;"><input type="radio" style="margin-right: 5px" class="param-option" name="group-${index}" value="exclude" checked>Exclude</label>

                <div id="name-input-${index}" class="name-entry" style="display: none; margin-top: 10px; padding-left: 20px;">
                    <label for="name-${index}" style="margin-right: 5px;">Name:</label>
                    <input type="text" id="name-${index}" style="width: 400px" name="name" placeholder="${clean_header}">
                </div>

                <div id="min-thresh-input-${index}" class="min-thresh-entry" style="display: none; margin-top: 10px; padding-left: 20px;">
                    <label for="min-thresh-${index}" style="margin-right: 5px;">Min Threshold:</label>
                    <input type="text" id="min-thresh-${index}" style="width: 100px" name="min-thresh">
                </div>

                <div id="max-thresh-input-${index}" class="max-thresh-entry" style="display: none; margin-top: 10px; padding-left: 20px;">
                    <label for="max-thresh-${index}" style="margin-right: 5px;">Max Threshold:</label>
                    <input type="text" id="max-thresh-${index}" style="width: 100px" name="max-thresh">
                </div>

                <div id="type-select-${index}" class="type-options" style="display: none; margin-top: 10px; padding-left: 20px;">
                    <label for="type-${index}" style="margin-right: 5px;"><span style="color: red;">*</span> Data Type:</label>
                    <select id="type-${index}">
                        <option value="float" selected>Float</option>
                        <option value="int">Integer</option>
                        <option value="string">String</option>
                    </select>
                </div>

                <div id="dist-select-${index}" class="dist-options" style="display: none; margin-top: 10px; padding-left: 20px;">
                    <label for="dist-${index}" style="margin-right: 5px;"><span style="color: red;">*</span> Distribution:</label>
                    <select id="dist-${index}">
                        <option value="Normal" selected>Normal</option>
                        <option value="LogNormal">LogNormal</option>
                        <option value="Exponential">Exponential</option>
                        <option value="Gamma">Gamma</option>
                        <option value="Beta">Beta</option>
                        <option value="Binomial">Binomial</option>
                        <option value="Poisson">Poisson</option>
                        <option value="NegativeBinomial">Negative Binomial</option>
                        <option value="Geometric">Geometric</option>
                        <option value="Bernoulli">Bernoulli</option>
                        <option value="ContinuousBernoulli">Continuous Bernoulli</option>
                        <option value="Uniform">Uniform</option>
                        <option value="FisherSnedecor">Fisher Snedecor</option>
                        <option value="HalfNormal">Half Normal</option>
                        <option value="InverseGamma">Inverse Gamma</option>
                        <option value="Pareto">Pareto</option>
                        <option value="Laplace">Laplace</option>
                        <option value="Chi2">Chi Squared</option>
                        <option value="Gumbel">Gumbel</option>
                        <option value="Cauchy">Cauchy</option>
                        <option value="HalfCauchy">HalfCauchy</option>
                    </select>
                </div>
            `;

            dataContainer.appendChild(row);
        });
    };
    reader.readAsText(file);
});

document.getElementById('export-options').addEventListener('change', function(event) {
    if (!event.target.classList.contains('export-option')) return;
    if (!event.target.checked) return;

    export_mode = event.target.value;
    renderModelParams(export_mode);
    modelContainer.style.display = 'block';
    exportButton.style.display = 'inline-block';
});

function collectAndExport() {
    const config = { inputs: {}, outputs: {}, model: {}, train: {} };
    const alertMessages = [];
    let isValid = true;

    if (!has_file) {
        isValid = false;
        alertMessages.push("- Invalid data parameters. Missing training data file.");
    }

    let inputCount = 0;
    let outputCount = 0;

    document.querySelectorAll('.data-param').forEach((row, index) => {
        const headerName = row.querySelector('strong').innerText;
        const selectedRadio = row.querySelector('input[type="radio"]:checked');
        const role = selectedRadio ? selectedRadio.value : 'exclude';

        if (role === 'input') {
            config.inputs[headerName] = {
                name: getFieldValue(`name-${index}`),
                type: document.getElementById(`type-${index}`).value
            };
            inputCount++;
        } else if (role === 'output') {
            const minThreshEl = document.getElementById(`min-thresh-${index}`);
            const maxThreshEl = document.getElementById(`max-thresh-${index}`);
            let minThreshValue = null;
            let maxThreshValue = null;

            if (minThreshEl.value !== undefined) {
                minThreshValue = Number(minThreshEl.value);
                if (isNaN(minThreshValue)) {
                    isValid = false;
                    alertMessages.push("- Invalid minimum threshold. Must be a number.");
                }
            }
            if (maxThreshEl.value !== undefined) {
                maxThreshValue = Number(maxThreshEl.value);
                if (isNaN(maxThreshValue)) {
                    isValid = false;
                    alertMessages.push("- Invalid maximum threshold. Must be a number.");
                }
            }

            config.outputs[headerName] = {
                name: getFieldValue(`name-${index}`),
                min_thresh: minThreshValue,
                max_thresh: maxThreshValue,
                type: document.getElementById(`type-${index}`).value,
                distribution: document.getElementById(`dist-${index}`).value
            };
            outputCount++;
        }
    });

    if (inputCount === 0) {
        isValid = false;
        alertMessages.push("- Invalid input parameters. Requires at least one input.");
    }
    if (outputCount === 0) {
        isValid = false;
        alertMessages.push("- Invalid output parameters. Requires at least one output.");
    }

    const isTrainMode = export_mode === 'Train';
    config.train.estimator = document.querySelector('input[name="estimation-method"]:checked').value;

    modelConfig.forEach(section => {
        section.params.forEach(param => {
            const value = getFieldValue(param.id);
            const paramKey = param.id.replace("-", "_");
            const alertText = isTrainMode ? param.train_alert : param.tune_alert;

            if (param.id === 'device') {
                config.train[paramKey] = value.toLowerCase();
                return;
            }
            if (param.id === 'architecture') {
                config.model[paramKey] = (export_mode === 'Tune')
                    ? Array.from(value).map(opt => opt.toLowerCase())
                    : value.toLowerCase();
                return;
            }

            if (export_mode === 'Tune' && TUNABLE_IDS.includes(param.id)) {
                let isList = false;
                try { isList = /^[^,]+(,[^,]+)+$/.test(value.trim()); }
                catch (error) {  }

                if (isList) {
                    const items = value.split(',').map(item => item.trim());
                    const validatedItems = [];
                    let allItemsValid = true;

                    items.forEach(item => {
                        const validated = validateNumericParam(param.id, item, false);
                        if (validated === null) {
                            allItemsValid = false;
                        } else {
                            validatedItems.push(validated);
                        }
                    });

                    if (allItemsValid) {
                        if (param.id === 'hidden-layers') {
                            config.model[paramKey] = validatedItems;
                        } else if (param.id === 'hidden-size') {
                            config.model[paramKey] = validatedItems;
                        } else {
                            config.train[paramKey] = validatedItems;
                        }
                    } else {
                        alertMessages.push(alertText);
                        isValid = false;
                    }
                    return;
                }
            }

            const validated = validateNumericParam(param.id, value, isTrainMode);
            if (validated === undefined) {
                if (param.id === 'hidden-layers') {
                    config.model[paramKey] = value;
                } else if (param.id === 'hidden-size') {
                    config.model[paramKey] = value;
                } else {
                    config.train[paramKey] = value;
                }
            } else if (validated === null) {
                alertMessages.push(alertText);
                isValid = false;
            } else {
                if (param.id === 'hidden-layers') {
                    config.model[paramKey] = validated;
                } else if (param.id === 'hidden-size') {
                    config.model[paramKey] = validated;
                } else {
                    config.train[paramKey] = validated;
                }
            }
        });
    });

    if (!isValid) {
        alert(alertMessages.join("\n"));
        return;
    }

    downloadJson(config, "config.json");
}

exportButton.addEventListener('click', collectAndExport);
</script>
